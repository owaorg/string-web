<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRING · Фотографии</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>
    <div class="bg-blur"></div>

    <header class="header">
        <div class="header-content">
            <a href="index.html" class="header-logo">STRING</a>
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="header-nav" id="headerNav">
                <a href="index.html" class="nav-link">Документация</a>
                <a href="about.html" class="nav-link">О String</a>

    <main class="photos-main">
        <div class="photos-container">
            <h1 class="photos-title">Фотографии</h1>

            <div class="photos-grid">

                <div class="photo-card">

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">STRING © 2026</p>
        </div>
    </footer>
    <script src="script.js"></script>
